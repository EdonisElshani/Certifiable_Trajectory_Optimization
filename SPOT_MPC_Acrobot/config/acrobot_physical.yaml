# SPOT_MPC_Acrobot/config/acrobot_physical.yaml

system:
  name: acrobot_so2_absolute
  angle_convention: "absolute body-frame angles"
  description: "thetaR1 and thetaR2 are absolute SO(2) link orientations"

physical:
  m1: 1.0
  m2: 1.0

  l1: 0.5
  l2: 0.5

  deltaJ1: 0.02
  deltaJ2: 0.02

  g: 9.81

  p0:
    - 0.0
    - 0.0

time:
  dt_sdp: 0.1
  dt_sim: 0.1
  control_interval: 0.1

mpc:
  max_iterations: 30
  stop_angle_tol_deg: 2.0
  stop_step_angle_tol_deg: 2.0
  cleanup_solver_artifacts: True

initial:
  thetaR1_deg: 5.0
  thetaR2_deg: 5.0
  thetaF1_deg: 0.0
  thetaF2_deg: 0.0

target:
  thetaR1_deg: 180.0
  thetaR2_deg: 180.0
  thetaF1_deg: 0.0
  thetaF2_deg: 0.0

bounds:
  u_max: 15.0
  lambda_max: 10.0
  max_step_angle_deg: 23.0

sdp:
  horizon_N: 3
  relaxation_order: 2
  clique_mode: "SELF"
  extraction: "ordered"

cost:
  rho_R: 100.0
  rho_F: 5.0
  alpha_R: 0.01
  alpha_F: 0.005
  gamma: 50.0

scaling:
  lambda_scale: 4.0
